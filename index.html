<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRY! N2 - 文法から伸ばす日本語</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Drawer Overlay -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    
    <!-- Sidebar Drawer -->
    <aside class="sidebar-drawer" id="sidebar-drawer">
        <div class="drawer-header">
            <div class="drawer-brand">
                <div class="drawer-logo">TRY! N2</div>
                <div class="drawer-subtitle">文法から伸ばす日本語</div>
            </div>
            <button class="drawer-close" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-content" id="drawer-content">
            <!-- Content will be loaded by JavaScript -->
        </div>
    </aside>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-container">
            <button class="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
                <span class="hamburger-icon">☰</span>
            </button>
            
            <div class="nav-title" id="current-section-title">TRY! N2</div>
            
            <div class="translate-buttons">
                <button class="translate-btn" id="translate-en-btn" onclick="toggleEnglish()" aria-label="Toggle English">
                    <span class="translate-icon">🇬🇧</span>
                    <span class="translate-text">EN</span>
                </button>
                <button class="translate-btn" id="translate-id-btn" onclick="toggleIndonesian()" aria-label="Toggle Indonesian">
                    <span class="translate-icon">🇮🇩</span>
                    <span class="translate-text">ID</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="main-container" id="main-container">
        <!-- Content will be loaded by JavaScript -->
    </main>

    <script src="app.js"></script>
</body>
</html>
