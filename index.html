<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TRY! N2 Sync</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-4">TRY! N2 (Auto Sync XML)</h1>

<div id="content"></div>

<script>
async function loadXML() {
    const res = await fetch('database.xml');
    const text = await res.text();
    const parser = new DOMParser();
    return parser.parseFromString(text, "text/xml");
}

function render(xml) {
    let html = "";

    xml.querySelectorAll("bab").forEach(bab => {
        const nomor = bab.querySelector("nomor")?.textContent;
        const jp = bab.querySelector("judul_jp")?.textContent;
        const en = bab.querySelector("judul_en")?.textContent;
        const halaman = bab.getAttribute("halaman");

        html += `
        <div class="bg-white p-4 rounded shadow mb-4">
            <h2 class="text-xl font-bold">
                Bab ${nomor}: ${jp}
                <span class="text-gray-500 text-sm">(${en})</span>
            </h2>
            <p class="text-sm text-gray-500">Page: ${halaman}</p>
        `;

        html += `<ul class="mt-3 list-disc ml-5">`;

        bab.querySelectorAll("grammar_points point").forEach(p => {
            html += `<li>${p.textContent} (p.${p.getAttribute("halaman")})</li>`;
        });

        html += `</ul></div>`;
    });

    document.getElementById("content").innerHTML = html;
}

loadXML().then(render);
</script>

</body>
</html>
