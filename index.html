<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRY! N2 Grammar</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== TOP NAV ===== -->
  <div class="top-nav">
    <div class="nav-container">

      <!-- Hamburger -->
      <button id="hamburger-btn" class="hamburger-btn">
        <span class="hamburger-icon">☰</span>
      </button>

      <!-- Title -->
      <div class="nav-title">TRY! N2</div>

      <!-- Translate -->
      <div class="translate-buttons">
        <button id="translate-en-btn" class="translate-btn">
          <span class="translate-text">EN</span>
        </button>
        <button id="translate-id-btn" class="translate-btn">
          <span class="translate-text">ID</span>
        </button>
      </div>

    </div>
  </div>

  <!-- ===== DRAWER ===== -->
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <aside id="sidebar-drawer" class="sidebar-drawer">
    <div class="drawer-header">
      <div class="drawer-brand">
        <div class="drawer-logo">TRY! N2</div>
        <div class="drawer-subtitle">Grammar App</div>
      </div>
      <button id="drawer-close" class="drawer-close">✕</button>
    </div>

    <div class="drawer-content" id="sidebar">
      <!-- MENU DARI JS -->
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main-container">
    <div id="content-container">
      <!-- CONTENT DARI JS -->
    </div>
  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
